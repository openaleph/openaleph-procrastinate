site_name: OpenAleph Procrastinate
site_url: https://openaleph.org/docs/lib/openaleph-procrastinate
repo_url: https://github.com/openaleph/openaleph-procrastinate
nav:
  - Intro: index.md
  - architecture.md
  - howto.md
  - conventions.md
  - setup.md
  - The Job model: job.md
  - Job priorities: priority.md
  - Reference:
    - defer: reference/defer.md
    - command line: reference/cli.md
    - model: reference/model.md
    - helpers: reference/helpers.md
    - settings: reference/settings.md
    - manage: reference/manage.md
theme:
  name: material
  logo: https://openaleph.org/assets/Logo/RGB/Open-Aleph-Logo-RGB-Square-Neg.svg
  favicon: https://openaleph.org/favicon.ico
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: lucide/sun
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: lucide/moon
        name: Switch to dark mode
  custom_dir: docs/overrides
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    # - navigation.footer
    - toc.follow
    - content.code.copy
extra_css:
  - https://dataresearchcenter.github.io/zensical-theme-darc/stylesheets/darc-zensical.css
extra:
  logo_light: https://openaleph.org/assets/Logo/RGB/Open-Aleph-Logo-RGB-Square-Pos.svg
  social:
    - icon: lucide/mail
      link: mailto:hi@dataresearchcenter.org
    - icon: lucide/globe
      link: https://dataresearchcenter.org
    - icon: simple/github
      link: https://github.com/openaleph/openaleph-procrastinate
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/dataresearchcenter/
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - admonition
  - pymdownx.tasklist:
      custom_checkbox: true
plugins:
  - search
  - autorefs
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: false
            show_object_full_path: false
